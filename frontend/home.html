<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="grain"></div>

    <div class="topbar">
        <div class="brand">SocialNet</div>
        <div class="nav-links">
            <a href="home.html" class="active">Trang chủ</a>
            <a href="explore.html">Khám phá</a>
            <a href="network.html">Mạng lưới</a>
            <a href="research.html">Nghiên cứu</a>
        </div>
        <div class="nav-user">
            <span id="current-user-name">Đang tải...</span>
            <div id="current-user-avatar" class="user-avatar">?</div>
            <a href="index.html" class="btn btn-sm" style="margin-left: 1rem;">Đổi tài khoản</a>
        </div>
    </div>

    <div class="container">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="stat-users">-</div>
                <div class="stat-label">Tổng người dùng</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-friends">-</div>
                <div class="stat-label">Bạn bè của bạn</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-score">-</div>
                <div class="stat-label">Điểm Jaccard cao nhất</div>
            </div>
        </div>

        <div class="dashboard-layout">
            <div class="sidebar">
                <div class="card" style="flex: 1;">
                    <div class="section-title">Danh sách bạn bè</div>
                    <div id="friends-list" style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem;">
                        <div class="empty-state">Đang tải...</div>
                    </div>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 2rem;">
                <div class="card">
                    <div class="section-title">Gợi ý kết bạn</div>
                    <div id="suggestions-list" style="margin-top: 1rem;">
                        <div class="empty-state">Đang tải...</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="section-title" style="display: flex; justify-content: space-between;">
                        <span>Mạng lưới lân cận</span>
                        <a href="network.html" style="font-size: 0.8rem; text-transform: none; color: var(--gold);">> Mở rộng</a>
                    </div>
                    <div id="network-container" style="height: 300px; margin-top: 1rem;"></div>
                </div>
            </div>

            <div class="sidebar">
                <div class="card" style="flex: 1;">
                    <div class="section-title">Hoạt động gần đây</div>
                    <div id="activity-feed" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
                        <div class="empty-state">Chưa có hoạt động</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { getUser, getUsers, getSuggestions, getFriends, addFriend, getNetworkData } from './js/api.js';
        import { getCurrentUserId, createAvatar } from './js/app.js';
        import { renderNetworkGraph } from './js/network.js';

        const userId = getCurrentUserId();
        if (!userId) {
            window.location.href = 'index.html';
        }

        let currentUser = null;
        let allUsers = [];
        let currentFriends = [];
        let currentSuggestions = [];

        async function init() {
            try {
                [currentUser, allUsers, currentFriends, currentSuggestions] = await Promise.all([
                    getUser(userId),
                    getUsers(),
                    getFriends(userId),
                    getSuggestions(userId)
                ]);

                // Update Header
                document.getElementById('current-user-name').textContent = currentUser.displayName;
                document.getElementById('current-user-avatar').textContent = createAvatar(currentUser.displayName);

                // Update Stats
                document.getElementById('stat-users').textContent = allUsers.length;
                document.getElementById('stat-friends').textContent = currentFriends.length;
                
                let maxScore = 0;
                if (currentSuggestions && currentSuggestions.length > 0) {
                    maxScore = Math.max(...currentSuggestions.map(s => s.jaccardScore));
                }
                document.getElementById('stat-score').textContent = maxScore.toFixed(2);

                renderFriends();
                renderSuggestions();
                loadNetwork();
            } catch (error) {
                console.error("Failed to init home page", error);
                document.getElementById('suggestions-list').innerHTML = `<div class="empty-state">Lỗi: ${error.message}</div>`;
            }
        }

        function renderFriends() {
            const container = document.getElementById('friends-list');
            if (!currentFriends || currentFriends.length === 0) {
                container.innerHTML = '<div class="empty-state">Chưa có bạn bè</div>';
                return;
            }

            container.innerHTML = currentFriends.map(f => `
                <div class="user-item">
                    <div class="user-avatar" style="width: 32px; height: 32px; font-size: 0.8rem; background-color: ${f.avatarColor || 'var(--primary)'};">
                        ${createAvatar(f.displayName)}
                    </div>
                    <div class="user-info">
                        <div class="user-name" style="font-size: 0.9rem;">${f.displayName}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderSuggestions() {
            const container = document.getElementById('suggestions-list');
            
            if (!currentSuggestions || currentSuggestions.length === 0) {
                container.innerHTML = '<div class="empty-state">Không có gợi ý nào</div>';
                return;
            }

            // Top 5 only
            const top5 = currentSuggestions.slice(0, 5);

            container.innerHTML = top5.map(s => {
                const pct = Math.min(100, Math.max(5, s.jaccardScore * 100)); // Minimum 5% for visibility
                return `
                <div class="suggestion-card">
                    <div class="user-avatar" style="background-color: ${s.user.avatarColor || 'var(--primary)'};">${createAvatar(s.user.displayName)}</div>
                    <div class="user-info">
                        <div class="user-name">${s.user.displayName}</div>
                        <div class="user-meta">${s.mutualCount} bạn chung</div>
                        <div class="score-bar-container">
                            <div class="score-bar" style="width: ${pct}%;"></div>
                        </div>
                    </div>
                    <div style="font-family: 'DM Mono'; font-size: 0.8rem; color: var(--gold); margin-right: 1rem;">
                        ${s.jaccardScore.toFixed(2)}
                    </div>
                    <button class="btn btn-sm btn-primary btn-add" data-id="${s.user.id}">Thêm</button>
                </div>
            `}).join('');

            document.querySelectorAll('.btn-add').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const targetId = e.target.dataset.id;
                    e.target.disabled = true;
                    e.target.textContent = 'Đang thêm...';
                    try {
                        await addFriend(userId, targetId);
                        
                        // Update lists and refresh UI locally
                        const addedUser = currentSuggestions.find(s => s.user.id === targetId)?.user;
                        currentSuggestions = currentSuggestions.filter(s => s.user.id !== targetId);
                        if (addedUser) {
                            currentFriends.push(addedUser);
                        }
                        
                        document.getElementById('stat-friends').textContent = currentFriends.length;
                        let maxScore = 0;
                        if (currentSuggestions.length > 0) {
                            maxScore = Math.max(...currentSuggestions.map(s => s.jaccardScore));
                        }
                        document.getElementById('stat-score').textContent = maxScore.toFixed(2);
                        
                        renderSuggestions();
                        renderFriends();
                        loadNetwork(); // Refresh graph data silently
                    } catch (err) {
                        e.target.disabled = false;
                        e.target.textContent = 'Thêm';
                        alert('Lỗi thêm bạn: ' + err.message);
                    }
                });
            });
        }

        async function loadNetwork() {
            try {
                // Fetch full network but filter depth 2
                // Since our backend doesn't have a specific depth-2 endpoint, we fetch all and let D3 render it
                // Or we can just render the full graph for now in the mini view
                const data = await getNetworkData();
                renderNetworkGraph('network-container', data);
            } catch (error) {
                document.getElementById('network-container').innerHTML = '<div class="empty-state">Lỗi tải mạng lưới</div>';
            }
        }

        init();
    </script>
</body>
</html>

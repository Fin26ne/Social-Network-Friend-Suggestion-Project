<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network - Khám phá</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="grain"></div>

    <div class="topbar">
        <div class="brand">SocialNet</div>
        <div class="nav-links">
            <a href="home.html">Trang chủ</a>
            <a href="explore.html" class="active">Khám phá</a>
            <a href="network.html">Mạng lưới</a>
            <a href="research.html">Nghiên cứu</a>
        </div>
        <div class="nav-user">
            <span id="current-user-name">Đang tải...</span>
            <div id="current-user-avatar" class="user-avatar">?</div>
            <a href="index.html" class="btn btn-sm" style="margin-left: 1rem;">Đổi tài khoản</a>
        </div>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
            <div>
                <h2 style="margin-bottom: 0.5rem; color: var(--gold);">Khám phá cộng đồng</h2>
                <p style="color: var(--muted); font-size: 0.9rem;">Tìm kiếm và kết nối với những người dùng khác</p>
            </div>
            <div style="width: 300px;">
                <input type="text" id="search-input" class="input-control" placeholder="Tìm kiếm tên...">
            </div>
        </div>

        <div id="explore-grid" class="grid">
            <div class="empty-state">Đang tải...</div>
        </div>
    </div>

    <script type="module">
        import { getUser, getUsers, getFriends, addFriend } from './js/api.js';
        import { getCurrentUserId, createAvatar } from './js/app.js';

        const userId = getCurrentUserId();
        if (!userId) {
            window.location.href = 'index.html';
        }

        let currentUser = null;
        let allUsers = [];
        let currentFriends = [];
        let filteredUsers = [];

        async function init() {
            try {
                [currentUser, allUsers, currentFriends] = await Promise.all([
                    getUser(userId),
                    getUsers(),
                    getFriends(userId)
                ]);

                // Update Header
                document.getElementById('current-user-name').textContent = currentUser.displayName;
                document.getElementById('current-user-avatar').textContent = createAvatar(currentUser.displayName);

                // Filter out current user and existing friends
                const friendsSet = new Set(currentFriends.map(f => f.id));
                filteredUsers = allUsers.filter(u => u.id !== userId && !friendsSet.has(u.id));

                renderGrid(filteredUsers);
                setupSearch();
            } catch (error) {
                document.getElementById('explore-grid').innerHTML = '<div class="empty-state">Lỗi tải dữ liệu</div>';
            }
        }

        function renderGrid(users) {
            const grid = document.getElementById('explore-grid');
            if (users.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;">Không tìm thấy người dùng phù hợp</div>';
                return;
            }

            grid.innerHTML = users.map(u => {
                let mutual = '?';

                return `
                <div class="card" style="display: flex; flex-direction: column; gap: 1rem;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div class="user-avatar" style="width: 48px; height: 48px; font-size: 1.2rem; background-color: ${u.avatarColor || 'var(--primary)'};">
                            ${createAvatar(u.displayName)}
                        </div>
                        <div>
                            <h3 class="user-name" style="font-size: 1.1rem; margin-bottom: 0.2rem;">${u.displayName}</h3>
                            <div class="user-meta">${u.age} tuổi</div>
                        </div>
                    </div>
                    ${u.bio ? `<div style="font-size: 0.85rem; color: var(--muted);">${u.bio}</div>` : ''}
                    <div style="font-family: 'DM Mono'; font-size: 0.8rem; color: var(--goldglow);">
                        ${mutual} bạn chung
                    </div>
                    <button class="btn btn-primary btn-add" style="width: 100%; margin-top: auto;" data-id="${u.id}">
                        Thêm bạn bè
                    </button>
                </div>
            `}).join('');

            document.querySelectorAll('.btn-add').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const targetId = e.target.dataset.id;
                    e.target.disabled = true;
                    e.target.textContent = 'Đang thêm...';
                    try {
                        await addFriend(userId, targetId);
                        // Refresh data
                        await init();
                    } catch (err) {
                        e.target.disabled = false;
                        e.target.textContent = 'Thêm bạn bè';
                        alert('Lỗi thêm bạn');
                    }
                });
            });
        }

        function setupSearch() {
            const input = document.getElementById('search-input');
            let timeout = null;

            input.addEventListener('input', (e) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    const term = e.target.value.toLowerCase();
                    const results = filteredUsers.filter(u => u.displayName.toLowerCase().includes(term));
                    renderGrid(results);
                }, 300);
            });
        }

        init();
    </script>
</body>
</html>
